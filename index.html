<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBox Music - Profesyonel Player</title>
    <style>
        :root { --p: #00d2ff; --bg: #0a0a0a; --c: #151515; }
        body { background: var(--bg); color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: var(--c); padding: 30px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #222; }
        h2 { color: var(--p); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #222; color: white; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px 0; transition: 0.3s; }
        .p-btn { background: var(--p); color: black; }
        .d-btn { background: #333; color: white; }
        #player { margin-top: 20px; display: none; }
        iframe { width: 100%; height: 180px; border-radius: 10px; border: 1px solid var(--p); }
        .loader { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>TBox Music v3</h2>
    <input type="text" id="url" placeholder="YouTube Linki...">
    
    <button class="p-btn" onclick="run('play')">Şimdi Çal (Arka Plan)</button>
    <button class="d-btn" onclick="run('dl')">MP3 İndir</button>

    <div id="player">
        <div id="video"></div>
        <p class="loader" id="msg">Müzik yükleniyor...</p>
    </div>
</div>

<script>
    function getID(u) {
        const m = u.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
        return (m) ? m[1] : null;
    }

    function run(type) {
        const id = getID(document.getElementById('url').value);
        if (!id) return alert("Geçerli bir link gir!");

        if (type === 'play') {
            document.getElementById('player').style.display = 'block';
            document.getElementById('video').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; picture-in-picture"></iframe>`;
            document.getElementById('msg').innerText = "Arka planda çalma aktif.";
        } else {
            // Alternatif ve daha stabil bir dönüştürücü servisi
            const apiLink = `https://loader.to/api/button/?url=https://www.youtube.com/watch?v=${id}&f=mp3`;
            window.open(apiLink, '_blank', 'width=400,height=500');
            document.getElementById('msg').innerText = "İndirme penceresi açıldı.";
        }
    }
</script>

</body>
</html>
