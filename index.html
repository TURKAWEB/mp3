<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBox Music - Kesintisiz</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #151515; padding: 30px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #333; }
        h2 { color: #ff4757; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #ff4757; color: white; }
        #status { margin-top: 15px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

<div class="box">
    <h2>TBox Music v5</h2>
    <input type="text" id="url" placeholder="YouTube Linkini Yapıştır...">
    <button class="btn" onclick="download()">MP3 İndir</button>
    <div id="status">Hazır</div>
</div>

<script>
    function download() {
        const url = document.getElementById('url').value;
        const status = document.getElementById('status');
        
        if (!url) return alert("Link girin!");

        status.innerText = "İşleniyor... Lütfen bekleyin.";
        
        // Bu yöntem, en stabil indirme motorlarından birine "sessiz" bir köprü kurar.
        // Başka siteye yönlendirmek yerine doğrudan indirme penceresini tetikler.
        const videoId = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
        if (videoId) {
            const id = videoId[1];
            const dlLink = `https://loader.to/api/card/?url=https://www.youtube.com/watch?v=${id}&f=mp3&color=ff4757`;
            
            // Gizli bir pencerede açıp doğrudan indirmeyi tetikliyoruz
            const win = window.open(dlLink, 'TBoxDownload', 'width=400,height=500');
            status.innerText = "İndirme penceresi açıldı, oradan 'Download'a basın.";
        } else {
            status.innerText = "Geçersiz YouTube linki!";
        }
    }
</script>

</body>
</html>
