<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBox Music Direct</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 15px; width: 350px; text-align: center; border: 1px solid #333; }
        h2 { color: #00d2ff; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .dl-btn { background: #00d2ff; color: #000; }
        #status { margin-top: 15px; font-size: 14px; color: #aaa; }
        .loader { border: 3px solid #333; border-top: 3px solid #00d2ff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="box">
    <h2>TBox Music</h2>
    <p>YouTube MP3 İndirici</p>
    <input type="text" id="url" placeholder="YouTube Linkini Yapıştır...">
    
    <button class="dl-btn" id="mainBtn" onclick="startDownload()">Hemen İndir</button>
    
    <div class="loader" id="loader"></div>
    <div id="status">Hazır</div>
</div>

<script>
    async function startDownload() {
        const url = document.getElementById('url').value;
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('mainBtn');

        if (!url.includes("youtube.com") && !url.includes("youtu.be")) {
            alert("Lütfen geçerli bir YouTube linki gir!");
            return;
        }

        // Arayüzü güncelle
        btn.disabled = true;
        loader.style.display = "block";
        status.innerText = "Müzik hazırlanıyor, lütfen bekleyin...";

        try {
            // Cobalt API - Ücretsiz ve açık kaynaklı, en stabil indirme yöntemidir
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({
                    url: url,
                    downloadMode: "audio",
                    audioFormat: "mp3"
                })
            });

            const data = await response.json();

            if (data.url) {
                // Gizli bir indirme linki oluştur ve tetikle
                const a = document.createElement('a');
                a.href = data.url;
                a.download = "TBox_Music.mp3";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                status.innerText = "İndirme Başladı!";
            } else {
                status.innerText = "Hata: Müzik bulunamadı.";
            }
        } catch (error) {
            status.innerText = "Hata: Sunucuya bağlanılamadı.";
            console.error(error);
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
