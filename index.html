<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBox MP3 Çalar - Full Screen</title>
    <style>
        :root { --neon: #00ff88; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            /* Arka plana müzik temalı bir görsel */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Link Giriş Alanı - Yerleşim Ayarları */
        .header {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            z-index: 100;
        }

        /* Bilgisayarda Sol Üst, Telefondaki Orta Ayarı */
        .input-container {
            display: flex;
            gap: 10px;
            padding: 0 20px;
            width: 100%;
            max-width: 500px;
        }

        @media (min-width: 768px) {
            .input-container { justify-content: flex-start; } /* PC: Sol */
        }
        @media (max-width: 767px) {
            .input-container { 
                justify-content: center; 
                margin: 0 auto;
            } /* Mobil: Orta */
        }

        input {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            outline: none;
            width: 250px;
        }

        button {
            background: var(--neon);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); }

        /* Oynatıcı Alanı - Tam Ekran */
        .player-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #display-area {
            width: 90%;
            height: 70%;
            max-width: 1000px;
            display: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .title-label {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: var(--neon);
            font-weight: bold;
            letter-spacing: 2px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="input-container">
            <input type="text" id="url" placeholder="YouTube Linkini Yapıştır...">
            <button onclick="cal()">ÇAL</button>
        </div>
    </div>

    <div class="player-wrapper">
        <div id="display-area">
            <!-- Video buraya gelecek -->
        </div>
    </div>

    <div class="title-label">TBOX MP3 ÇALAR</div>

    <script>
        function cal() {
            const url = document.getElementById('url').value;
            const area = document.getElementById('display-area');
            const match = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);

            if (match) {
                const id = match[1];
                area.style.display = "block";
                area.innerHTML = `
                    <iframe 
                        src="https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}" 
                        allow="autoplay; encrypted-media; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                `;
            } else {
                alert("Geçerli bir link girin!");
            }
        }
    </script>
</body>
</html>
