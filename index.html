<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBox Music Web V7</title>
    <style>
        body { background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 30px; border-radius: 20px; width: 380px; text-align: center; border: 1px solid #222; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        h1 { color: #00ffcc; font-size: 24px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #00ffcc; color: #000; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #00cca3; }
        #status { margin-top: 15px; font-size: 13px; color: #888; }
        #player-area { margin-top: 20px; display: none; }
        iframe { width: 100%; height: 60px; border-radius: 10px; border: none; background: transparent; }
    </style>
</head>
<body>

<div class="box">
    <h1>TBox Music V7</h1>
    <p>YouTube Linkini Buraya Yapıştırın</p>
    <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
    
    <button class="btn" onclick="startProcess()">Müziği Hazırla</button>

    <div id="player-area">
        <div id="api-frame"></div>
        <p id="status">İşlem başlatıldı...</p>
    </div>
</div>

<script>
    function startProcess() {
        const url = document.getElementById('urlInput').value;
        const status = document.getElementById('status');
        const playerArea = document.getElementById('player-area');
        const apiFrame = document.getElementById('api-frame');

        // Video ID Ayıklama
        const match = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
        
        if (match) {
            const id = match[1];
            playerArea.style.display = "block";
            status.innerText = "Lütfen bekleyin, MP3 butonu oluşturuluyor...";
            
            // Reklamsız ve yönlendirmesiz çalışan güncel API Widget'ı
            // Bu widget doğrudan senin sayfanın içinde bir buton oluşturur.
            apiFrame.innerHTML = `
                <iframe 
                    src="https://convert2mp3s.com/api/button/mp3/${id}" 
                    scrolling="no">
                </iframe>
            `;
        } else {
            alert("Lütfen geçerli bir YouTube linki girin!");
        }
    }
</script>

</body>
</html>
