<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBox Music - Otomatik İndirici</title>
    <style>
        body { background: #080808; color: #00ff88; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 20px; width: 350px; text-align: center; border: 2px solid #222; box-shadow: 0 0 30px rgba(0,255,136,0.1); }
        h1 { margin-bottom: 20px; font-size: 26px; text-shadow: 0 0 10px #00ff88; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #00ff88; color: #000; font-size: 16px; transition: 0.3s; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; color: #888; min-height: 20px; }
        .loader { border: 3px solid #222; border-top: 3px solid #00ff88; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; display: none; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>TBox Music</h1>
    <input type="text" id="link" placeholder="YouTube Linkini Yapıştır...">
    <button class="btn" id="btn" onclick="indir()">Dosyayı İndir</button>
    <div class="loader" id="loading"></div>
    <div id="status">Hazır bekliyor...</div>
</div>

<script>
    async function indir() {
        const urlInput = document.getElementById('link').value;
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');
        const btn = document.getElementById('btn');

        if (!urlInput) return alert("Link girmediniz!");

        // Arayüz kilitleme ve yükleme animasyonu
        btn.disabled = true;
        loading.style.display = "block";
        status.innerText = "Sunucu ile bağlantı kuruluyor...";

        try {
            // Cobalt API - Reklamsız ve doğrudan indirme sağlar
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({
                    url: urlInput,
                    downloadMode: "audio", // Sadece ses
                    audioFormat: "mp3"
                })
            });

            const data = await response.json();

            if (data.status === "stream" || data.url) {
                status.innerText = "İndirme başlatılıyor!";
                
                // Gizli indirme tetikleyici
                const gizliLink = document.createElement('a');
                gizliLink.href = data.url;
                gizliLink.download = "TBox_Muzik.mp3";
                document.body.appendChild(gizliLink);
                gizliLink.click();
                document.body.removeChild(gizliLink);
                
                status.innerText = "Tamamlandı!";
            } else {
                status.innerText = "Hata: Sunucu dosyayı hazırlayamadı.";
            }
        } catch (error) {
            status.innerText = "Hata: Sunucuya bağlanılamadı.";
            console.error(error);
        } finally {
            btn.disabled = false;
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
