<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBox Music - Background Player & Downloader</title>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            width: 400px;
            text-align: center;
        }

        h1 { color: var(--primary); font-size: 24px; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #252525;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 10px; flex-direction: column; }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .play-btn { background: var(--primary); color: white; }
        .dl-btn { background: #2f3542; color: white; }

        #player-area {
            margin-top: 20px;
            display: none;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        iframe {
            border-radius: 10px;
            width: 100%;
            height: 200px;
            background: #000;
        }

        .info-text {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TBox Music V2</h1>
    <input type="text" id="videoUrl" placeholder="YouTube Linkini Buraya Yapıştırın...">
    
    <div class="btn-group">
        <button class="play-btn" onclick="playMusic()">Şimdi Çal (Arka Plan)</button>
        <button class="dl-btn" onclick="downloadMusic()">Müziği İndir</button>
    </div>

    <div id="player-area">
        <div id="videoContainer"></div>
        <p id="status">Müzik Çalıyor...</p>
        <p class="info-text">Mobil cihazlarda arka planda çalması için sekmeyi kapatmayın, sadece başka sekmeye geçin.</p>
    </div>
</div>

<script>
    function getID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function playMusic() {
        const url = document.getElementById('videoUrl').value;
        const id = getID(url);

        if (id) {
            document.getElementById('player-area').style.display = 'block';
            // Arka planda çalma desteği için YouTube Embed kullanıyoruz
            // autoplay=1 ve mute=0 (ses açık) parametreleri ekliyoruz
            document.getElementById('videoContainer').innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
            document.getElementById('status').innerText = "Oynatılıyor... (Diğer sekmelere geçebilirsiniz)";
        } else {
            alert("Lütfen geçerli bir link girin.");
        }
    }

    function downloadMusic() {
        const url = document.getElementById('videoUrl').value;
        const id = getID(url);

        if (id) {
            // "Yanıt verilmesi uzun sürdü" hatasını aşmak için yönlendirme yöntemi
            // Bu yöntem doğrudan stabil indirme sunucusuna bağlar
            const dlLink = `https://www.y2mate.com/youtube/${id}`;
            window.open(dlLink, '_blank');
        } else {
            alert("Lütfen geçerli bir link girin.");
        }
    }
</script>

</body>
</html>
