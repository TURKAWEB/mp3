<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBox Music - Global Fix</title>
    <style>
        body { background: #000; color: #00ff88; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 25px; border-radius: 15px; width: 350px; text-align: center; border: 2px solid #00ff88; box-shadow: 0 0 20px #00ff8844; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #00ff88; background: #000; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; background: #00ff88; color: #000; transition: 0.3s; }
        #download-zone { margin-top: 20px; display: none; padding: 10px; border-top: 1px dashed #444; }
        iframe { width: 100%; height: 50px; border: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>TBox Music V8</h2>
    <p style="color: #fff; font-size: 12px;">Ülke hatası giderildi.</p>
    <input type="text" id="videoLink" placeholder="YouTube Linkini Girin...">
    <button onclick="fixAndDownload()">Müziği Hazırla</button>

    <div id="download-zone">
        <div id="api-inject"></div>
        <p style="font-size: 11px; color: #888;">Buton birazdan görünecektir...</p>
    </div>
</div>

<script>
    function fixAndDownload() {
        const url = document.getElementById('videoLink').value;
        const zone = document.getElementById('download-zone');
        const inject = document.getElementById('api-inject');

        const match = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
        
        if (match) {
            const id = match[1];
            zone.style.display = "block";
            
            // Ülke veya IP kısıtlaması yapmayan, en geniş kapsamlı widget'ı kullanıyoruz.
            // Bu API genellikle "invalid country" hatası vermez.
            inject.innerHTML = `
                <iframe 
                    src="https://api.vevioz.com/@api/button/mp3/${id}" 
                    scrolling="no">
                </iframe>
            `;
        } else {
            alert("Lütfen geçerli bir YouTube linki gir!");
        }
    }
</script>

</body>
</html>
