<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBox MP3 Çalar - TurkaCloud Edition</title>
    <style>
        :root { --neon: #00ff88; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Üst Bar Tasarımı */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 100;
        }

        /* Link Girişi Yerleşimi */
        .input-container {
            display: flex;
            gap: 12px;
        }

        /* Logo Ayarları - Boyut Büyütüldü */
        .logo-container img {
            height: 80px; /* Logo daha büyük yapıldı */
            width: auto;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
        }

        /* Mobil Uyumluluk Ayarları */
        @media (max-width: 767px) {
            .header {
                flex-direction: column-reverse;
                gap: 25px;
                text-align: center;
                padding-top: 15px;
            }
            .input-container {
                justify-content: center;
            }
            .logo-container img {
                height: 65px; /* Mobilde biraz daha dengeli boyut */
            }
        }

        input {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon);
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            outline: none;
            width: 250px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus { border-color: white; box-shadow: 0 0 15px var(--neon); }

        button {
            background: var(--neon);
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); background: white; }

        /* Oynatıcı Alanı */
        .player-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding-top: 100px;
        }

        #display-area {
            width: 85%;
            height: 65%;
            max-width: 1200px;
            display: none;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .footer-tag {
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: var(--neon);
            font-size: 11px;
            letter-spacing: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <!-- Sol Üst: Link Girişi -->
        <div class="input-container">
            <input type="text" id="url" placeholder="Şarkı linkini buraya bırak...">
            <button onclick="cal()">ÇAL</button>
        </div>

        <!-- Sağ Üst: TurkaCloud Logo (Referans Dosya) -->
        <div class="logo-container">
            <img src="TURKACLOUD.jpg" alt="TurkaCloud Logo">
        </div>
    </div>

    <div class="player-wrapper">
        <div id="display-area"></div>
    </div>

    <div class="footer-tag">TBOX x TURKACLOUD</div>

    <script>
        function cal() {
            const url = document.getElementById('url').value;
            const area = document.getElementById('display-area');
            const match = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);

            if (match) {
                const id = match[1];
                area.style.display = "block";
                area.innerHTML = `
                    <iframe 
                        src="https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}" 
                        allow="autoplay; encrypted-media; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                `;
            } else {
                alert("Lütfen geçerli bir müzik linki girin!");
            }
        }
    </script>
</body>
</html>
